name: citas_app
description: Aplicación de gestión de citas médicas SaaS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # HTTP y API
  dio: ^5.4.0
  
  # Almacenamiento seguro
  flutter_secure_storage: ^9.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Calendario
  table_calendar: ^3.0.9
  
  # Utilidades
  intl: any
  
  # Formularios
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.0.0

  # Tipografía
  google_fonts: ^6.2.1

  # Web APIs (Speech Recognition)
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
